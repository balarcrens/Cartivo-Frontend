<!doctype html>
<html lang="en">

<head>
    <!-- Charset -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Cartivo - Fashion, Electronics & Online Shopping Store</title>
    <meta name="title" content="Cartivo - Fashion, Electronics & Online Shopping Store" />

    <meta name="description"
        content="Discover fashion, electronics, groceries, mobiles, accessories and more at Cartivo with secure checkout, fast delivery, premium quality products and exciting offers." />

    <meta name="keywords"
        content="Cartivo, ecommerce, online shopping, fashion, electronics, groceries, mobile shopping, clothing, gadgets, shoes, accessories" />

    <meta name="author" content="Cartivo" />

    <meta name="robots" content="index, follow, max-image-preview:large" />

    <meta name="googlebot" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#6366f1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://cartivoshop.vercel.app/" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="Cartivo - Fashion, Electronics & Online Shopping Store" />

    <meta property="og:description"
        content="Discover fashion, electronics, groceries, mobiles, accessories and more at Cartivo with secure checkout, fast delivery, premium quality and exciting offers." />

    <meta property="og:image" content="https://cartivoshop.vercel.app/og-image.png" />

    <meta property="og:image:alt" content="Cartivo Ecommerce Store" />

    <meta property="og:image:secure_url" content="https://cartivoshop.vercel.app/og-image.png" />

    <meta property="og:image:type" content="image/png" />

    <meta property="og:image:width" content="1200" />

    <meta property="og:image:height" content="634" />

    <meta property="og:url" content="https://cartivoshop.vercel.app/" />

    <meta property="og:site_name" content="Cartivo" />

    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Cartivo - Fashion, Electronics & Online Shopping Store" />

    <meta name="twitter:description"
        content="Discover fashion, electronics, groceries, mobiles, accessories and more at Cartivo with secure checkout, fast delivery, premium quality and exciting offers." />

    <meta name="twitter:image" content="https://cartivoshop.vercel.app/og-image.png" />

    <meta name="twitter:image:src" content="https://cartivoshop.vercel.app/og-image.png" />

    <meta name="twitter:image:alt" content="Cartivo Ecommerce Store Banner" />

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Cartivo",
      "url": "https://cartivoshop.vercel.app/",
      "logo": "https://cartivoshop.vercel.app/logo.png",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- Website Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Cartivo",
      "url": "https://cartivoshop.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://cartivoshop.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
